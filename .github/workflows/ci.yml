name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contracts:
    name: Stellar contracts (fmt, clippy, test, wasm build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Stellar-contracts-v1
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88.0"
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Stellar-contracts-v1/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Stellar-contracts-v1/Cargo.lock') }}

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --all

      - name: cargo build (wasm32, release)
        run: cargo build --target wasm32-unknown-unknown --release

  relayer:
    name: Relayer (typecheck, lint, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: relayer
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: relayer/package-lock.json

      - name: npm ci
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
